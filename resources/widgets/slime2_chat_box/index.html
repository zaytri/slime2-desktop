<div id="widget"></div>

<!-- message template, inserted into the widget above -->
<template id="message-template">
	<div class="message">
		<span class="user"></span><span class="content"></span>
	</div>
</template>

<!-- user template, inserted into the user class -->
<template id="user-template"
	><span class="badges"></span><span class="name"></span
	><span class="pronouns"></span
></template>

<!-- badge template, inserted into the badges class -->
<template id="badge-template"><img class="badge" /></template>

<!-- text template, inserted into the content class -->
<template id="text-fragment-template"><span class="text"></span></template>

<!-- mention template, inserted into the content class -->
<template id="mention-fragment-template"
	><span class="mention"></span
></template>

<!-- emote template, inserted into the content class -->
<template id="emote-fragment-template"><img class="emote" /></template>

<!-- cheermote template, inserted into the content class -->
<template id="cheermote-fragment-template"
	><img class="cheermote emote" /><span class="cheer-amount"></span
></template>

<!-- svg used for outline -->
<svg class="absolute inset-0 size-0 opacity-0">
	<defs>
		<filter id="outline" height="200%" width="200%" x="-50%" y="-50%">
			<!-- outline thickness -->
			<feMorphology
				id="outline-thickness"
				in="SourceAlpha"
				result="outline-thickness"
				operator="dilate"
				radius="2"
			/>

			<!-- outline color -->
			<feFlood
				id="outline-color"
				flood-color="black"
				flood-opacity="1"
				result="outline-color"
			/>

			<!-- apply color -->
			<feComposite
				in="outline-color"
				in2="outline-thickness"
				operator="in"
				result="outline-layer"
			/>

			<!-- outline blur -->
			<feGaussianBlur
				id="outline-blur"
				in="outline-layer"
				stdDeviation="0"
				result="outline-blur"
			/>

			<!-- outline offset -->
			<feOffset
				id="outline-offset"
				in="outline-blur"
				dx="0"
				dy="0"
				result="outline-result"
			/>

			<feMerge>
				<!-- draw outline -->
				<feMergeNode in="outline-result" />
				<!-- draw source -->
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>
</svg>
